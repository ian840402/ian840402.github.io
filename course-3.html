<!doctype html><!doctype html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width,initial-scale=1"> <title>Document</title> <link href="css/style.css" rel="stylesheet"></head> <body> <div class="title">第一週課題 & 實作練習</div> <div class="rule"> <ul> <li>1. 區塊一點擊後在瀏覽器的 js 控制台 (console) 裡面顯示 '點擊了一次' 的字樣</li> <li>2. 區塊二點擊後在瀏覽器的 js 控制台 (console) 裡面顯示 '點擊了 n 次' 的字樣</li> <li class="plus">*. 區塊三點及後會在下方新增新增區塊，並顯示這是第 n 個新增的區塊</li> </ul> <div class="description">紅字為額外題目</div> </div> <div id="computer"> <div class="btn-wrap"> <div class="btn" data-value="">AC</div> <div class="btn" data-value="multiplication">*</div> <div class="btn" data-value="division">/</div> <div class="btn" data-value="addition">+</div> <div class="btn" data-value="7">7</div> <div class="btn" data-value="8">8</div> <div class="btn" data-value="9">9</div> <div class="btn" data-value="subtraction">-</div> <div class="btn" data-value="7">4</div> <div class="btn" data-value="7">5</div> <div class="btn" data-value="7">6</div> <div class="btn" data-value="equal">=</div> <div class="btn" data-value="7">1</div> <div class="btn" data-value="7">2</div> <div class="btn" data-value="7">3</div> <div class="btn" data-value="0">0</div> </div> </div> <script type="text/javascript" src="js/main.js"></script></body> </html>
